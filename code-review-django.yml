name: Automated Code Review

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'

permissions:
  pull-requests: write
  contents: read

# ─── ONLY THIS SECTION CHANGES BETWEEN NEXTJS AND DJANGO ───
env:
  TECH_FILE: django.md
  GUIDELINES_REPO: Relish-Repo/code-review-guidelines
  GUIDELINES_BRANCH: main
# ────────────────────────────────────────────────────────────

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Collect PR metadata ──────────────────────────────
      - name: Collect PR metadata
        id: metadata
        run: |
          git log origin/${{ github.base_ref }}...HEAD \
            --pretty=format:"- %s" > /tmp/commits.txt
          echo "✅ Commits collected."

      # ── Step 2: Get filtered diff ─────────────────────────────────
      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- ':!**/migrations/*.py' \
            ':!*.lock'               \
            ':!requirements*.txt'    \
            ':!staticfiles/**'       \
            ':!media/**'             \
            ':!*.pyc' > /tmp/pr.diff

          # Strip git header noise — keep only actual code changes
          grep -vE '^(diff --git|index |old mode|new mode|Binary|similarity|rename|copy)' \
            /tmp/pr.diff > /tmp/pr_clean.diff || true
          mv /tmp/pr_clean.diff /tmp/pr.diff

          SIZE=$(wc -c < /tmp/pr.diff)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

          if [ "$SIZE" -eq 0 ]; then
            echo "empty=true"      >> $GITHUB_OUTPUT
            echo "truncated=false" >> $GITHUB_OUTPUT
            echo "⚠️ No reviewable changes after filtering. Skipping."
          elif [ "$SIZE" -gt 150000 ]; then
            head -c 150000 /tmp/pr.diff > /tmp/pr_trim.diff
            mv /tmp/pr_trim.diff /tmp/pr.diff
            echo "empty=false"    >> $GITHUB_OUTPUT
            echo "truncated=true" >> $GITHUB_OUTPUT
            echo "⚠️ Diff truncated at 150K chars."
          else
            echo "empty=false"     >> $GITHUB_OUTPUT
            echo "truncated=false" >> $GITHUB_OUTPUT
            echo "✅ Diff size: ${SIZE} chars."
          fi

      # ── Step 3: Fetch guidelines from central repo ────────────────
      - name: Fetch guidelines
        if: steps.diff.outputs.empty == 'false'
        run: |
          BASE="https://raw.githubusercontent.com/${{ env.GUIDELINES_REPO }}/${{ env.GUIDELINES_BRANCH }}"

          curl -sSf "$BASE/core.md" -o /tmp/core.md \
            || { echo "❌ Failed to fetch core.md"; exit 1; }

          curl -sSf "$BASE/${{ env.TECH_FILE }}" -o /tmp/tech.md \
            || { echo "❌ Failed to fetch ${{ env.TECH_FILE }}"; exit 1; }

          echo "✅ Guidelines fetched."

      # ── Step 4: Install SDK ───────────────────────────────────────
      - name: Install Anthropic SDK
        if: steps.diff.outputs.empty == 'false'
        run: pip install anthropic --quiet --break-system-packages

      # ── Step 5: Write review script ───────────────────────────────
      - name: Write review script
        if: steps.diff.outputs.empty == 'false'
        run: |
          cat > /tmp/review.py << 'PYTHON'
          import anthropic
          import os
          import sys

          # Load files
          core    = open("/tmp/core.md").read().strip()
          tech    = open("/tmp/tech.md").read().strip()
          diff    = open("/tmp/pr.diff").read().strip()
          commits = open("/tmp/commits.txt").read().strip() \
                    if os.path.exists("/tmp/commits.txt") else ""

          truncated = os.environ.get("TRUNCATED", "false") == "true"
          pr_title  = os.environ.get("PR_TITLE", "").strip()
          pr_body   = os.environ.get("PR_BODY", "").strip()[:500]

          if not diff:
              with open("/tmp/review.txt", "w") as f:
                  f.write("NO_DIFF")
              sys.exit(0)

          # Build PR context block
          context_parts = []
          if pr_title:
              context_parts.append(f"PR Title: {pr_title}")
          if pr_body:
              context_parts.append(f"PR Description: {pr_body}")
          if commits:
              context_parts.append(f"Commits in this PR:\n{commits}")
          if truncated:
              context_parts.append(
                  "⚠️ This diff was truncated at 150,000 chars. "
                  "Review is based on partial changes — flag this in your summary."
              )
          context = "\n\n".join(context_parts)

          # System prompt: role + guidelines + output format
          system_prompt = f"""You are a senior code reviewer. \
Find real bugs, security issues, and reliability problems only. \
Do not comment on formatting or style — linters handle that.

## Core Guidelines
{core}

## Tech-Specific Guidelines
{tech}

## Response Format — follow exactly, no deviations:

### 🔍 Issues
- **[CRITICAL|HIGH|MEDIUM|LOW]** Description. `file:line` → How to fix.
If no issues found write: "No issues found."

### 💡 Suggestions
Up to 2 impactful improvements only. Skip this section entirely if nothing meaningful to add.

### 📋 Summary
One sentence. Maximum 15 words."""

          # User message: context + diff
          user_message = f"""{context}

PR Diff:
```diff
{diff}
```"""

          # Call Claude API
          client = anthropic.Anthropic(api_key=os.environ["CLAUDE_API_KEY"])

          try:
              response = client.messages.create(
                  model="claude-haiku-4-5-20251001",
                  max_tokens=2000,
                  temperature=0,
                  system=system_prompt,
                  messages=[{"role": "user", "content": user_message}]
              )
              review = response.content[0].text

          except anthropic.RateLimitError:
              review = "⚠️ Review skipped: Claude API rate limit reached. Try again shortly."
          except anthropic.AuthenticationError:
              review = "⚠️ Review skipped: Invalid CLAUDE_API_KEY. Check your repository secret."
          except Exception as e:
              review = f"⚠️ Review failed unexpectedly: {str(e)}"

          with open("/tmp/review.txt", "w") as f:
              f.write(review)

          print("✅ Review written.")
          PYTHON

      # ── Step 6: Run the review ────────────────────────────────────
      - name: Run review script
        if: steps.diff.outputs.empty == 'false'
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TRUNCATED:      ${{ steps.diff.outputs.truncated }}
          PR_TITLE:       ${{ github.event.pull_request.title }}
          PR_BODY:        ${{ github.event.pull_request.body }}
        run: python3 /tmp/review.py

      # ── Step 7: Post comment on PR ────────────────────────────────
      - name: Post comment on PR
        if: always() && steps.diff.outputs.empty == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");

            if (!fs.existsSync("/tmp/review.txt")) {
              console.log("No review file found. Skipping.");
              return;
            }

            const review    = fs.readFileSync("/tmp/review.txt", "utf8").trim();
            const truncated = "${{ steps.diff.outputs.truncated }}" === "true";

            if (!review || review === "NO_DIFF") {
              console.log("Empty diff or no review output. Skipping comment.");
              return;
            }

            const truncatedNote = truncated
              ? "\n⚠️ **Diff truncated at 150K chars.** Split large PRs for a complete review."
              : "";

            const body = [
              "## 🤖 Automated Code Review",
              "",
              review,
              "",
              "---",
              truncatedNote,
              `*Powered by Claude AI · [Guidelines](https://github.com/${{ env.GUIDELINES_REPO }})*`
            ].filter(line => line !== undefined).join("\n");

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            console.log("✅ Review comment posted.");
